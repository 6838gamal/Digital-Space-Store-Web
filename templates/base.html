  <link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}">

  <!-- Other CSS -->
  <link rel="icon" href="{{ url_for('static', path='images/fevicon.png') }}" type="image/gif">
  <link rel="stylesheet" href="{{ url_for('static', path='css/jquery.mCustomScrollbar.min.css') }}">
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="{{ url_for('static', path='css/owl.carousel.min.css') }}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/fancybox/2.1.5/jquery.fancybox.min.css" media="screen">

  <!-- Apply saved theme & lang ASAP to avoid flash -->
  <script>
    (function() {
      var theme = localStorage.getItem('dsTheme') || 'light';
      var lang  = localStorage.getItem('dsLang')  || 'en';
      document.documentElement.setAttribute('data-theme', theme);
      document.documentElement.setAttribute('lang', lang);
      document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
    })();
  </script>
</head>
<body>

{% block content %}{% endblock %}

<!-- Back to top button -->
<button id="back-to-top" aria-label="Back to top">
  <i class="fa fa-chevron-up"></i>
</button>

<!-- Sidebar overlay -->
<div id="sidenav-overlay"></div>

<!-- Admin login modal -->
<div class="admin-modal-overlay" id="adminModal">
  <div class="admin-modal-box">
    <button class="admin-modal-close-x" id="adminModalCloseX" aria-label="Close">&times;</button>
    <h3>🔐 <span data-en="Admin Access" data-ar="دخول الإدارة">Admin Access</span></h3>
    <p data-en="Sign in with your admin account." data-ar="سجّل دخولك بحساب المدير.">Sign in with your admin account.</p>

    <!-- Login fields form (prevents password-outside-form warning) -->
    <form id="adminLoginFields" onsubmit="return false;">
      <input type="email" class="admin-modal-input" id="adminEmailInput"
             data-en-placeholder="Email address" data-ar-placeholder="البريد الإلكتروني"
             placeholder="Email address" autocomplete="email">

      <input type="password" class="admin-modal-input" id="adminPasswordInput"
             data-en-placeholder="Password" data-ar-placeholder="كلمة المرور"
             placeholder="Password" autocomplete="current-password">
    </form>

    <div class="admin-modal-error" id="adminModalError"
         data-en="Invalid email or password." data-ar="البريد أو كلمة المرور غير صحيحة.">
      Invalid email or password.
    </div>

    <div class="admin-modal-actions">
      <button class="admin-modal-submit" id="adminModalSubmit"
              data-en="Sign In" data-ar="دخول">Sign In</button>
      <button class="admin-modal-cancel" id="adminModalCancel"
              data-en="Cancel" data-ar="إلغاء">Cancel</button>
    </div>

    <div id="adminModalSpinner" style="display:none;text-align:center;padding:8px 0;font-size:13px;color:var(--text-muted);">
      ⏳ <span data-en="Signing in..." data-ar="جارٍ التسجيل...">Signing in...</span>
    </div>

    <!-- Hidden form for server session creation -->
    <form id="adminDemoLoginForm" action="/admin/demo-login" method="POST" style="display:none;">
      <input type="text" name="username" value="admin">
    </form>
  </div>
</div>

<!-- JS -->
<script src="{{ url_for('static', path='js/jquery.min.js') }}"></script>
<script src="{{ url_for('static', path='js/popper.min.js') }}"></script>
<script src="{{ url_for('static', path='js/bootstrap.bundle.min.js') }}"></script>
<script src="{{ url_for('static', path='js/jquery-3.0.0.min.js') }}"></script>
<script src="{{ url_for('static', path='js/plugin.js') }}"></script>
<script src="{{ url_for('static', path='js/jquery.mCustomScrollbar.concat.min.js') }}"></script>
<script src="{{ url_for('static', path='js/custom.js') }}"></script>

<script>
// ===== SIDEBAR OPEN / CLOSE =====
function openNav() {
  var drawer  = document.getElementById('mySidenav');
  var overlay = document.getElementById('sidenav-overlay');
  if (drawer)  drawer.classList.add('open');
  if (overlay) overlay.classList.add('active');
  document.body.style.overflow = 'hidden';
}

function closeNav() {
  var drawer  = document.getElementById('mySidenav');
  var overlay = document.getElementById('sidenav-overlay');
  if (drawer)  drawer.classList.remove('open');
  if (overlay) overlay.classList.remove('active');
  document.body.style.overflow = '';
}

var overlayEl = document.getElementById('sidenav-overlay');
if (overlayEl) overlayEl.addEventListener('click', closeNav);

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeNav();
});

// ===== LANGUAGE SYSTEM =====
var TRANSLATIONS = {
  en: {
    'nav-home': 'Home',
    'nav-products': 'Products',
    'nav-fashion': 'Fashion',
    'nav-electronic': 'Electronics',
    'nav-jewellery': 'Jewellery',
    'nav-cart': 'Cart',
    'nav-orders': 'My Orders',
    'nav-chat': 'Chat',
    'nav-profile': 'Profile',
    'nav-admin': 'Admin Panel',
    'sidebar-browse': 'Browse',
    'sidebar-account': 'Account',
    'sidebar-title': 'Digital Space',
    'theme-dark': '🌙 Dark',
    'theme-light': '☀️ Light',
    'lang-switch': 'عربي',
    'admin-modal-title': 'Admin Access',
    'admin-modal-desc': 'Enter the admin password to continue.',
    'admin-modal-enter': 'Enter',
    'admin-modal-cancel': 'Cancel',
    'admin-modal-error': 'Incorrect password. Please try again.',
    'admin-modal-placeholder': 'Password',
  },
  ar: {
    'nav-home': 'الرئيسية',
    'nav-products': 'المنتجات',
    'nav-fashion': 'الموضة',
    'nav-electronic': 'الإلكترونيات',
    'nav-jewellery': 'المجوهرات',
    'nav-cart': 'السلة',
    'nav-orders': 'طلباتي',
    'nav-chat': 'الدردشة',
    'nav-profile': 'حسابي',
    'nav-admin': 'لوحة التحكم',
    'sidebar-browse': 'تصفح',
    'sidebar-account': 'الحساب',
    'sidebar-title': 'ديجيتال سبيس',
    'theme-dark': '🌙 داكن',
    'theme-light': '☀️ فاتح',
    'lang-switch': 'English',
    'admin-modal-title': 'دخول الإدارة',
    'admin-modal-desc': 'أدخل كلمة مرور المدير للمتابعة.',
    'admin-modal-enter': 'دخول',
    'admin-modal-cancel': 'إلغاء',
    'admin-modal-error': 'كلمة المرور غير صحيحة. حاول مرة أخرى.',
    'admin-modal-placeholder': 'كلمة المرور',
  }
};

function getCurrentLang() {
  return localStorage.getItem('dsLang') || 'en';
}

function applyLanguage(lang) {
  var html = document.documentElement;
  html.setAttribute('lang', lang);
  html.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
  localStorage.setItem('dsLang', lang);

  var t = TRANSLATIONS[lang] || TRANSLATIONS['en'];

  // Update all data-key elements
  document.querySelectorAll('[data-trans]').forEach(function(el) {
    var key = el.getAttribute('data-trans');
    if (t[key]) el.textContent = t[key];
  });

  // Update all data-en / data-ar elements
  var attr = lang === 'ar' ? 'data-ar' : 'data-en';
  document.querySelectorAll('[data-en],[data-ar]').forEach(function(el) {
    var val = el.getAttribute(attr);
    if (val !== null) el.textContent = val;
  });

  // Update placeholders
  var phAttr = lang === 'ar' ? 'data-ar-placeholder' : 'data-en-placeholder';
  document.querySelectorAll('[data-en-placeholder],[data-ar-placeholder]').forEach(function(el) {
    var val = el.getAttribute(phAttr);
    if (val !== null) el.placeholder = val;
  });

  // Update lang switcher buttons
  document.querySelectorAll('.sidebar-lang-btn, .header-lang-btn').forEach(function(btn) {
    btn.textContent = lang === 'ar' ? 'English' : 'عربي';
  });

  // Update theme button text
  var currentTheme = localStorage.getItem('dsTheme') || 'light';
  document.querySelectorAll('.sidebar-theme-btn').forEach(function(btn) {
    btn.innerHTML = currentTheme === 'dark'
      ? (lang === 'ar' ? '☀️ فاتح' : '☀️ Light')
      : (lang === 'ar' ? '🌙 داكن' : '🌙 Dark');
  });
}

function toggleLanguage() {
  var lang = getCurrentLang() === 'ar' ? 'en' : 'ar';
  applyLanguage(lang);
}

// ===== THEME SYSTEM =====
function getCurrentTheme() {
  return localStorage.getItem('dsTheme') || 'light';
}

function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  localStorage.setItem('dsTheme', theme);
  var lang = getCurrentLang();
  document.querySelectorAll('.sidebar-theme-btn').forEach(function(btn) {
    if (theme === 'dark') {
      btn.innerHTML = lang === 'ar' ? '☀️ فاتح' : '☀️ Light';
    } else {
      btn.innerHTML = lang === 'ar' ? '🌙 داكن' : '🌙 Dark';
    }
  });
  document.querySelectorAll('.header-theme-btn').forEach(function(btn) {
    btn.innerHTML = theme === 'dark' ? '☀️' : '🌙';
  });
}

function toggleTheme() {
  var newTheme = getCurrentTheme() === 'dark' ? 'light' : 'dark';
  applyTheme(newTheme);
}

// ===== ADMIN MODAL (Firebase Auth) =====
function openAdminModal() {
  closeNav();
  var modal = document.getElementById('adminModal');
  modal.classList.add('active');
  setTimeout(function() {
    var emailInput = document.getElementById('adminEmailInput');
    if (emailInput) emailInput.focus();
  }, 120);
}

function closeAdminModal() {
  document.getElementById('adminModal').classList.remove('active');
  var emailEl = document.getElementById('adminEmailInput');
  var passEl  = document.getElementById('adminPasswordInput');
  var err     = document.getElementById('adminModalError');
  var spinner = document.getElementById('adminModalSpinner');
  var submit  = document.getElementById('adminModalSubmit');
  if (emailEl) emailEl.value = '';
  if (passEl)  { passEl.value = ''; passEl.classList.remove('error'); }
  if (err)     err.classList.remove('visible');
  if (spinner) spinner.style.display = 'none';
  if (submit)  submit.disabled = false;
}

function showAdminError(msg) {
  var err = document.getElementById('adminModalError');
  var passEl = document.getElementById('adminPasswordInput');
  if (err) { err.textContent = msg; err.classList.add('visible'); }
  if (passEl) {
    passEl.classList.add('error');
    setTimeout(function() { passEl.classList.remove('error'); }, 400);
  }
  var spinner = document.getElementById('adminModalSpinner');
  var submit  = document.getElementById('adminModalSubmit');
  if (spinner) spinner.style.display = 'none';
  if (submit)  submit.disabled = false;
}

function submitAdminPassword() {
  var emailEl   = document.getElementById('adminEmailInput');
  var passEl    = document.getElementById('adminPasswordInput');
  var spinner   = document.getElementById('adminModalSpinner');
  var submit    = document.getElementById('adminModalSubmit');
  var lang      = getCurrentLang();

  var email    = emailEl ? emailEl.value.trim() : '';
  var password = passEl  ? passEl.value         : '';

  if (!email || !password) {
    showAdminError(lang === 'ar' ? 'أدخل البريد الإلكتروني وكلمة المرور.' : 'Please enter email and password.');
    return;
  }

  if (spinner) spinner.style.display = 'block';
  if (submit)  submit.disabled = true;

  // Firebase email/password sign-in
  firebase.auth().signInWithEmailAndPassword(email, password)
    .then(function() {
      // Server session
      document.getElementById('adminDemoLoginForm').submit();
    })
    .catch(function(error) {
      var msg = lang === 'ar'
        ? 'البريد الإلكتروني أو كلمة المرور غير صحيحة.'
        : 'Invalid email or password.';
      if (error.code === 'auth/too-many-requests') {
        msg = lang === 'ar' ? 'محاولات كثيرة، حاول لاحقاً.' : 'Too many attempts. Try later.';
      }
      showAdminError(msg);
    });
}

document.getElementById('adminModal').addEventListener('click', function(e) {
  if (e.target === this) closeAdminModal();
});
document.getElementById('adminModalCancel').addEventListener('click', closeAdminModal);
document.getElementById('adminModalCloseX').addEventListener('click', closeAdminModal);
document.getElementById('adminModalSubmit').addEventListener('click', submitAdminPassword);
document.getElementById('adminPasswordInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { e.preventDefault(); submitAdminPassword(); }
  if (e.key === 'Escape') closeAdminModal();
});
document.getElementById('adminEmailInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    var pass = document.getElementById('adminPasswordInput');
    if (pass) pass.focus();
  }
  if (e.key === 'Escape') closeAdminModal();
});

// ===== GOOGLE SUBSCRIBE (Footer) =====
function subscribeWithGoogle() {
  var btn = document.getElementById('subscribeGoogleBtn');
  if (btn) {
    btn.disabled = true;
    var lang = getCurrentLang();
    btn.innerHTML = '⏳ ' + (lang === 'ar' ? 'جارٍ الاتصال...' : 'Connecting...');
  }

  var provider = new firebase.auth.GoogleAuthProvider();
  provider.addScope('email');

  firebase.auth().signInWithPopup(provider)
    .then(function(result) {
      var user  = result.user;
      var uid   = user.uid;
      var email = user.email;
      var name  = user.displayName || '';

      return firebase.database().ref('subscribers/' + uid).set({
        email:        email,
        name:         name,
        subscribedAt: Date.now(),
        lang:         getCurrentLang()
      });
    })
    .then(function() {
      var pre  = document.getElementById('subscribe-state-pre');
      var post = document.getElementById('subscribe-state-post');
      if (pre)  pre.style.display  = 'none';
      if (post) post.style.display = 'flex';

      // Redirect to home after 2 seconds
      setTimeout(function() { window.location.href = '/'; }, 2000);
    })
    .catch(function(error) {
      if (btn) {
        btn.disabled = false;
        var lang2 = getCurrentLang();
        btn.innerHTML = (lang2 === 'ar' ? '🔔 اشترك بـ Google' : '🔔 Subscribe with Google');
      }
      if (error.code !== 'auth/popup-closed-by-user') {
        console.error('Subscribe error:', error.code);
      }
    });
}

// ===== SIDEBAR SUBMENU TOGGLE =====
document.querySelectorAll('.sidenav-toggle-item').forEach(function(item) {
  item.addEventListener('click', function() {
    var targetId = this.getAttribute('data-target');
    var submenu = document.getElementById(targetId);
    var isOpen = submenu.classList.contains('open');
    // Close all submenus
    document.querySelectorAll('.sidenav-submenu').forEach(function(sm) { sm.classList.remove('open'); });
    document.querySelectorAll('.sidenav-toggle-item').forEach(function(ti) { ti.classList.remove('open'); });
    if (!isOpen) {
      submenu.classList.add('open');
      this.classList.add('open');
    }
  });
});

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  var lang = getCurrentLang();
  var theme = getCurrentTheme();
  applyLanguage(lang);
  applyTheme(theme);
});
</script>

</body>
</html>
