{% extends "base.html" %}
{% block content %}

<div class="profile_page container">

  <!-- عنوان الصفحة -->
  <h2 class="page_title">حسابي</h2>

  <!-- معلومات المستخدم -->
  <div class="user_info">
    <p><strong>الاسم:</strong> Gamal Almaqtary</p>
    <p><strong>البريد الإلكتروني:</strong> user@example.com</p>
    <p><strong>رقم الهاتف:</strong> +967 774 440 982</p>
  </div>

  <!-- نموذج تعديل البيانات -->
  <div class="edit_profile">
    <h3>تعديل بيانات الحساب</h3>
    <form method="POST" action="/profile">
      <label for="name">الاسم الكامل:</label>
      <input type="text" id="name" name="name" value="Gamal Almaqtary" required>

      <label for="email">البريد الإلكتروني:</label>
      <input type="email" id="email" name="email" value="user@example.com" required>

      <label for="phone">رقم الهاتف:</label>
      <input type="tel" id="phone" name="phone" value="+967 774 440 982" required>

      <button type="submit" class="btn_save">حفظ التغييرات</button>
    </form>
  </div>

  <!-- إجراءات الحساب -->
  <div class="account_actions">
    <a href="/orders" class="btn">عرض الطلبات</a>
    <a href="/logout" class="btn logout">تسجيل الخروج</a>
  </div>

</div>

{% endblock %}
