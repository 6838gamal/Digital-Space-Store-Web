{% extends "base.html" %}
{% block content %}
<main class="chat-page" dir="rtl">
  <aside class="chat-sidebar">
    <div class="chat-sidebar-header">
      <strong>المحادثات</strong>
      <button type="button" id="newConversation">+ جديدة</button>
    </div>
    <div class="conversation-list" id="conversationList"></div>
    <a class="admin-shortcut" href="/admin">إدارة المتجر</a>
  </aside>

  <section class="chat-shell">
    <div class="chat-header">
      <div>
        <div class="chat-title">وكيل التسوق الذكي</div>
        <p>اسأل عن المنتجات أو اطلب مني فتح السلة والدفع والطلبات والحساب.</p>
      </div>
      <a class="chat-home-link" href="/">العودة للمتجر</a>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="message bot">
        مرحباً، أنا وكيل التسوق. أستطيع اقتراح المنتجات وتوجيهك داخل المتجر عبر الدردشة. ماذا تبحث عنه اليوم؟
      </div>
    </div>

    <div class="quick-prompts" id="quickPrompts">
      <button type="button" data-prompt="اقترح لي أفضل منتج متاح">اقترح منتج</button>
      <button type="button" data-prompt="افتح السلة">السلة</button>
      <button type="button" data-prompt="كيف أكمل الطلب؟">الدفع</button>
      <button type="button" data-prompt="ماذا تستطيع أن تفعل؟">مزايا الوكيل</button>
    </div>

    <form class="chat-input" id="chatForm">
      <input type="text" id="userInput" placeholder="اكتب طلبك هنا..." autocomplete="off" />
      <button type="submit">إرسال</button>
    </form>
  </section>
</main>

<script>
  const chatHistory = [];
  let currentConversationId = null;
  const form = document.getElementById("chatForm");
  const input = document.getElementById("userInput");
  const messages = document.getElementById("chatMessages");
  const quickPrompts = document.getElementById("quickPrompts");
  const conversationList = document.getElementById("conversationList");
  const newConversation = document.getElementById("newConversation");

  function appendMessage(role, text, actions = []) {
    const wrapper = document.createElement("div");
    wrapper.className = `message ${role}`;
    wrapper.innerText = text;
    messages.appendChild(wrapper);

    if (actions.length) {
      const actionList = document.createElement("div");
      actionList.className = "message-actions";
      actions.forEach((item) => {
        const link = document.createElement("a");
        link.href = item.url;
        link.innerText = item.label;
        actionList.appendChild(link);
      });
      messages.appendChild(actionList);
    }

    messages.scrollTop = messages.scrollHeight;
  }

  function resetMessages() {
    chatHistory.length = 0;
    messages.innerHTML = "";
    appendMessage("bot", "مرحباً، أنا وكيل التسوق. أستطيع اقتراح المنتجات وتوجيهك داخل المتجر عبر الدردشة. ماذا تبحث عنه اليوم؟");
  }

  async function loadConversations() {
    const response = await fetch("/api/chat/conversations");
    const conversations = await response.json();
    conversationList.innerHTML = "";
    if (!conversations.length) {
      const empty = document.createElement("div");
      empty.className = "conversation-empty";
      empty.innerText = "لا توجد محادثات بعد";
      conversationList.appendChild(empty);
      return;
    }
    conversations.forEach((conversation) => {
      const button = document.createElement("button");
      button.type = "button";
      button.className = conversation.id === currentConversationId ? "active" : "";
      button.innerText = conversation.title || "محادثة";
      button.addEventListener("click", () => openConversation(conversation.id));
      conversationList.appendChild(button);
    });
  }

  async function openConversation(conversationId) {
    const response = await fetch(`/api/chat/conversations/${conversationId}`);
    const data = await response.json();
    currentConversationId = data.id;
    chatHistory.length = 0;
    messages.innerHTML = "";
    if (!data.messages.length) {
      appendMessage("bot", "محادثة جديدة. كيف أساعدك في التسوق؟");
    }
    data.messages.forEach((message) => {
      appendMessage(message.role === "assistant" ? "bot" : "user", message.content);
      chatHistory.push({ role: message.role, content: message.content });
    });
    await loadConversations();
  }

  function appendTyping() {
    const typing = document.createElement("div");
    typing.className = "message bot typing";
    typing.id = "typingMessage";
    typing.innerText = "الوكيل يبحث في معرفة المتجر...";
    messages.appendChild(typing);
    messages.scrollTop = messages.scrollHeight;
  }

  function removeTyping() {
    const typing = document.getElementById("typingMessage");
    if (typing) typing.remove();
  }

  async function sendMessage(text) {
    const message = text.trim();
    if (!message) return;

    appendMessage("user", message);
    chatHistory.push({ role: "user", content: message });
    input.value = "";
    appendTyping();

    try {
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message, history: chatHistory.slice(-8), conversation_id: currentConversationId }),
      });

      if (!response.ok) {
        throw new Error("تعذر الاتصال بالوكيل");
      }

      const data = await response.json();
      currentConversationId = data.conversation_id;
      removeTyping();
      appendMessage("bot", data.reply, data.actions || []);
      chatHistory.push({ role: "assistant", content: data.reply });
      await loadConversations();
    } catch (error) {
      removeTyping();
      appendMessage("bot", "حدث خطأ أثناء معالجة الطلب. حاول مرة أخرى بعد قليل.");
    }
  }

  form.addEventListener("submit", (event) => {
    event.preventDefault();
    sendMessage(input.value);
  });

  quickPrompts.addEventListener("click", (event) => {
    const prompt = event.target.dataset.prompt;
    if (prompt) sendMessage(prompt);
  });

  newConversation.addEventListener("click", async () => {
    const response = await fetch("/api/chat/conversations", { method: "POST" });
    const data = await response.json();
    currentConversationId = data.id;
    resetMessages();
    await loadConversations();
  });

  loadConversations();
</script>
{% endblock %}
